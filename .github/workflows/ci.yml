name: ci

on:
  push:
    branches:
      - main
      - multi-os
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux runtime test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo rustc cmake meson ninja-build qemu-user-static umoci
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Rust tests (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cargo test --locked --manifest-path cli/Cargo.toml

      - name: Rust tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo test --locked --manifest-path cli/Cargo.toml

      - name: Cargo fmt
        if: runner.os == 'Linux'
        shell: bash
        run: cargo fmt --all --check

      - name: Cargo package
        if: runner.os == 'Linux'
        shell: bash
        run: cargo package --allow-dirty --locked --no-verify --manifest-path cli/Cargo.toml

      - name: Check generated depofiles
        if: runner.os == 'Linux'
        shell: bash
        run: ./tools/regenerate-local-depofiles.sh --check

      - name: Repo CMake smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake --fresh -S . -B build/ci -DBUILD_TESTING=ON
          cmake --build build/ci --parallel
          ctest --test-dir build/ci --output-on-failure --no-tests=error --parallel

      - name: Repo CMake smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --fresh -S . -B build/ci -DBUILD_TESTING=ON
          cmake --build build/ci --parallel
          ctest --test-dir build/ci --output-on-failure --no-tests=error --parallel
