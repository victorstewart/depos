name: ci

on:
  push:
    branches:
      - main
      - multi-os
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux runtime test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo rustc cmake meson ninja-build qemu-user-static umoci
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Rust tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME "$(command -v cargo)" test --locked --manifest-path cli/Cargo.toml -j"$(nproc)"

      - name: Rust tests (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: cargo test --locked --manifest-path cli/Cargo.toml -j"$(sysctl -n hw.ncpu)"

      - name: Rust tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo test --locked --manifest-path cli/Cargo.toml -j $env:NUMBER_OF_PROCESSORS

      - name: Cargo fmt
        if: runner.os == 'Linux'
        shell: bash
        run: cargo fmt --all --check

      - name: Cargo package
        if: runner.os == 'Linux'
        shell: bash
        run: sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME "$(command -v cargo)" package --allow-dirty --locked --no-verify --manifest-path cli/Cargo.toml

      - name: Check generated depofiles
        if: runner.os == 'Linux'
        shell: bash
        run: ./tools/regenerate-local-depofiles.sh --check

      - name: Repo CMake smoke (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME cmake --fresh -S . -B build/ci-linux -DBUILD_TESTING=ON
          sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME cmake --build build/ci-linux --parallel
          sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME ctest --test-dir build/ci-linux --output-on-failure --no-tests=error --parallel

      - name: Repo CMake smoke (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cmake --fresh -S . -B build/ci-macos -DBUILD_TESTING=ON
          cmake --build build/ci-macos --parallel
          ctest --test-dir build/ci-macos --output-on-failure --no-tests=error --parallel

      - name: Repo CMake smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --fresh -S . -B build/ci-windows -DBUILD_TESTING=ON
          cmake --build build/ci-windows --config Debug --parallel
          ctest --test-dir build/ci-windows -C Debug --output-on-failure --no-tests=error --parallel
