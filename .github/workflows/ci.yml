name: ci

on:
  push:
    branches:
      - main
      - multi-os
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux runtime test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo rustc cmake meson ninja-build qemu-user-static umoci
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up WSL
        if: runner.os == 'Windows'
        uses: Vampire/setup-wsl@v6
        with:
          distribution: Ubuntu-24.04
          set-as-default: true
          use-cache: false

      - name: Rust tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME "$(command -v cargo)" test --locked --manifest-path cli/Cargo.toml -j"$(nproc)" 2>&1 | tee "$log"; then
            echo "::error::Linux cargo test failed; recent output follows"
            mapfile -t tail_lines < <(tail -n 60 "$log")
            printf '%s\n' "${tail_lines[@]}"
            chunk_size=20
            for ((start=0; start<${#tail_lines[@]}; start+=chunk_size)); do
              end=$((start + chunk_size))
              if (( end > ${#tail_lines[@]} )); then
                end=${#tail_lines[@]}
              fi
              block=$(printf '%s \\n ' "${tail_lines[@]:start:end-start}")
              block=${block//'%'/'%25'}
              block=${block//$'\r'/'%0D'}
              block=${block//$'\n'/'%0A'}
              printf '::error::Linux cargo test tail [%d-%d]: %s\n' "$((start + 1))" "$end" "$block"
            done
            grep -E 'test .*FAILED|failures:|panicked at|error:' "$log" | tail -n 20 | while IFS= read -r line; do
              printf '::error::%s\n' "$line"
            done
            exit 1
          fi

      - name: Rust tests (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: cargo test --locked --manifest-path cli/Cargo.toml -j"$(sysctl -n hw.ncpu)"

      - name: Rust tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DEPOS_TEST_LINUX_PROVIDER: "1"
          DEPOS_SOURCE_REPO: ${{ github.workspace }}
        run: |
          $log = Join-Path $env:TEMP "depos-windows-rust-tests.log"
          if (Test-Path $log) {
            Remove-Item $log -Force
          }
          $manifest = (Resolve-Path "cli/Cargo.toml").Path.Replace("'", "''")
          $workspace = (Resolve-Path ".").Path
          $escapedLog = $log.Replace("'", "''")
          $command = @"
& cargo test --locked --manifest-path '$manifest' -j $env:NUMBER_OF_PROCESSORS 2>&1 | Tee-Object -FilePath '$escapedLog'
exit `$LASTEXITCODE
"@
          $proc = Start-Process -FilePath "pwsh" -ArgumentList @("-NoLogo", "-NoProfile", "-Command", $command) -WorkingDirectory $workspace -PassThru
          $deadline = (Get-Date).AddMinutes(25)
          $exitCode = $null
          $lastTail = ""
          while (-not $proc.HasExited) {
            Start-Sleep -Seconds 30
            $proc.Refresh()
            if (Test-Path $log) {
              $currentTail = ((Get-Content $log -Tail 20) -join "`n")
              if ($currentTail -and $currentTail -ne $lastTail) {
                Write-Host "::notice::Windows cargo test heartbeat"
                Get-Content $log -Tail 20 | ForEach-Object { Write-Host $_ }
                $lastTail = $currentTail
              }
            }
            if ((Get-Date) -ge $deadline) {
              Stop-Process -Id $proc.Id -Force
              $exitCode = 124
              Write-Host "::error::Windows cargo test exceeded 25 minutes and was terminated"
              break
            }
          }
          if ($null -eq $exitCode) {
            $exitCode = $proc.ExitCode
          }
          if ($exitCode -ne 0) {
            Write-Host "::error::Windows cargo test failed; recent output follows"
            $tail = if (Test-Path $log) { Get-Content $log -Tail 60 } else { @() }
            $tail | ForEach-Object { Write-Host $_ }
            $chunkSize = 20
            for ($start = 0; $start -lt $tail.Count; $start += $chunkSize) {
              $end = [Math]::Min($start + $chunkSize - 1, $tail.Count - 1)
              $block = [string]::Join(' \n ', $tail[$start..$end])
              $escaped = $block.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
              Write-Host "::error::Windows cargo test tail [$($start + 1)-$($end + 1)]: $escaped"
            }
            $lines = if (Test-Path $log) { Get-Content $log } else { @() }
            $seen = [System.Collections.Generic.HashSet[string]]::new()
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -notmatch 'panicked at|materialization log tail|caused by:|provider shell command failed|error:') {
                continue
              }
              $end = [Math]::Min($i + 7, $lines.Count - 1)
              $window = $lines[$i..$end]
              $block = [string]::Join(' \n ', $window)
              if (-not $seen.Add($block)) {
                continue
              }
              $escaped = $block.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
              Write-Host "::error::$escaped"
            }
            exit $exitCode
          }

      - name: Cargo fmt
        if: runner.os == 'Linux'
        shell: bash
        run: cargo fmt --all --check

      - name: Cargo package
        if: runner.os == 'Linux'
        shell: bash
        run: sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME "$(command -v cargo)" package --allow-dirty --locked --no-verify --manifest-path cli/Cargo.toml

      - name: Check generated depofiles
        if: runner.os == 'Linux'
        shell: bash
        run: ./tools/regenerate-local-depofiles.sh --check

      - name: Repo CMake smoke (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME cmake --fresh -S . -B build/ci-linux -DBUILD_TESTING=ON
          sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME cmake --build build/ci-linux --parallel
          sudo --preserve-env=HOME,PATH,CARGO_HOME,RUSTUP_HOME ctest --test-dir build/ci-linux --output-on-failure --no-tests=error --parallel

      - name: Repo CMake smoke (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cmake --fresh -S . -B build/ci-macos -DBUILD_TESTING=ON
          cmake --build build/ci-macos --parallel
          ctest --test-dir build/ci-macos --output-on-failure --no-tests=error --parallel

      - name: Repo CMake smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --fresh -S . -B build/ci-windows -DBUILD_TESTING=ON
          cmake --build build/ci-windows --config Debug --parallel
          ctest --test-dir build/ci-windows -C Debug --output-on-failure --no-tests=error --parallel
